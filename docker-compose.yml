version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: azvpn-postgres
    environment:
      POSTGRES_USER: azvpn_user
      POSTGRES_PASSWORD: azvpn_pass_2026
      POSTGRES_DB: azvpn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - azvpn-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: azvpn-redis
    ports:
      - "6379:6379"
    networks:
      - azvpn-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: azvpn-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://azvpn_user:azvpn_pass_2026@postgres:5432/azvpn
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-azvpn-super-secret-key-change-it}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - azvpn-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: azvpn-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - azvpn-network
    command: npm run dev
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: azvpn-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - azvpn-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  azvpn-network:
    driver: bridge